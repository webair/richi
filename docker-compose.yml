services:
  revers-proxy:
    build: ./reverse_proxy
    container_name: reverse-proxy
    environment:
      HOST: ${RICHI_HOST}
      UPSTREAM_WEB_SERVICE: web-service:3000
    depends_on:
      - web-service
    ports:
      - 80:80
      - 443:443
  mqtt-broker:
    build: ./mqtt_broker
    container_name: mqtt-broker
    environment:
      USERNAME: ${MQTT_BROKER_USERNAME}
      PASSWORD: ${MQTT_BROKER_PASSWORD}
    ports:
      - "1883:1883"
    restart: no
  web-service:
    build: ./web_service
    container_name: web-service
    environment:
      WEB_SERVICE_HOST: ${RICHI_HOST}
      MQTT_BROKER_HOST: mqtt-broker
      MQTT_BROKER_USERNAME: ${MQTT_BROKER_USERNAME}
      MQTT_BROKER_PASSWORD: ${MQTT_BROKER_PASSWORD}
    depends_on:
      - mqtt-broker
    ports:
      - "3000:3000"
    restart: no

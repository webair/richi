services:
  revers-proxy:
    image: webair/richi-remote-lock-reverse-proxy:latest
    container_name: richi-reverse-proxy
    networks:
      - richi-network
    environment:
      WEB_SERVICE_URL: web-service:3000
      WEB_CLIENT_URL: web-client:80
      URL: ${URL}
    user: "${UID}:${GID}"
    volumes:
      - ./data/caddy_data:/data
    ports:
      - 80:80
      - 443:443
    restart: unless-stopped
  mqtt-broker:
    image: webair/richi-remote-lock-mqtt-broker:latest
    container_name: richi-mqtt-broker
    networks:
      - richi-network
    environment:
      MQTT_BROKER_USERNAME: ${MQTT_BROKER_USERNAME}
      MQTT_BROKER_PASSWORD: ${MQTT_BROKER_PASSWORD}
    ports:
      - "1883:1883"
    restart: unless-stopped
  web-service:
    image: webair/richi-remote-lock-web-service:latest
    container_name: richi-web-service
    networks:
      - richi-network
    environment:
      JWKS_URL: ${JWKS_URL}
      MQTT_BROKER_HOST: mqtt-broker
      MQTT_BROKER_USERNAME: ${MQTT_BROKER_USERNAME}
      MQTT_BROKER_PASSWORD: ${MQTT_BROKER_PASSWORD}
      NUKI_LOCK_ID: ${NUKI_LOCK_ID}
      URL: ${URL}
      TZ: Europe/Zurich
    user: "${UID}:${GID}"
    volumes:
      - ./data/logs:/app/logs
    restart: unless-stopped
  web-client:
    image: webair/richi-remote-lock-web-client:latest
    container_name: richi-web-client
    networks:
      - richi-network
    restart: unless-stopped

networks:
  richi-network:
    driver: bridge
